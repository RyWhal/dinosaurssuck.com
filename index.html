<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Simulator | dinosaurssuck.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }

        #game {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            pointer-events: none;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        h1 span {
            color: #ff6b6b;
        }

        .stats {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .stat {
            margin: 4px 0;
        }

        #tierDisplay {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #a78bfa;
            font-weight: 600;
        }

        #tierProgress {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
            margin-top: 2px;
        }

        #instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            text-align: center;
            pointer-events: none;
        }

        #killcount {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 3rem;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 2px 2px 8px rgba(255,0,0,0.3);
            z-index: 100;
            pointer-events: none;
        }

        #killcount small {
            display: block;
            font-size: 0.9rem;
            font-weight: normal;
            color: rgba(255,255,255,0.6);
        }

        .combo {
            position: fixed;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd93d;
            pointer-events: none;
            animation: comboFloat 1.5s ease-out forwards;
            z-index: 200;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes comboFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        #megaMeterContainer {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            z-index: 100;
            pointer-events: none;
        }

        #megaMeterLabel {
            text-align: center;
            color: #fff;
            font-size: 0.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        #megaMeterLabel.ready {
            color: #ffd93d;
            opacity: 1;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { text-shadow: 0 0 10px #ffd93d; }
            to { text-shadow: 0 0 30px #ff6b6b, 0 0 60px #ff0000; }
        }

        #megaMeter {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #555;
        }

        #megaMeterFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #ff6b6b);
            background-size: 200% 100%;
            animation: meterShine 1s linear infinite;
            transition: width 0.3s ease-out;
            border-radius: 8px;
        }

        #megaMeterFill.ready {
            background: linear-gradient(90deg, #ffd93d, #ff0000, #ffd93d);
            box-shadow: 0 0 20px #ff6b6b;
        }

        @keyframes meterShine {
            from { background-position: 200% 0; }
            to { background-position: 0 0; }
        }

        #zoomControls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-width: 320px;
            justify-content: flex-end;
        }

        #zoomControls button {
            height: 36px;
            padding: 0 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #zoomControls button:hover:not(:disabled) {
            background: rgba(255,255,255,0.2);
        }

        #zoomControls button.active {
            background: rgba(255,107,107,0.5);
        }

        #zoomControls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #restartBtn {
            background: rgba(255,50,50,0.15) !important;
        }
        #restartBtn:hover:not(:disabled) {
            background: rgba(255,50,50,0.3) !important;
        }

        .megaWarning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000, 0 0 60px #ff6b6b;
            animation: warningPulse 0.3s ease-in-out infinite alternate;
            z-index: 300;
            pointer-events: none;
        }

        @keyframes warningPulse {
            from { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            to { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        /* Mega button: hidden until ready */
        #megaButton {
            display: none;
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
            cursor: pointer;
            z-index: 100;
            animation: megaButtonPulse 0.5s ease-in-out infinite alternate;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
            touch-action: manipulation;
        }

        #megaButton:active {
            transform: translateX(-50%) scale(0.95);
        }

        @keyframes megaButtonPulse {
            from { box-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
            to { box-shadow: 0 0 40px rgba(255, 200, 100, 0.8), 0 0 60px rgba(255, 107, 107, 0.4); }
        }

        /* Tier unlock toast notification */
        .tier-unlock-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #2a1a4b);
            border: 2px solid #8b5cf6;
            border-radius: 16px;
            padding: 20px 36px;
            text-align: center;
            z-index: 400;
            pointer-events: none;
            animation: toastIn 0.35s ease-out, toastOut 0.4s ease-in 2.1s forwards;
        }

        .tier-unlock-toast h3 {
            color: #8b5cf6;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .tier-unlock-toast .tier-name {
            color: #ffd93d;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .tier-unlock-toast .tier-desc {
            color: rgba(255,255,255,0.65);
            font-size: 0.82rem;
            margin-top: 5px;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -58%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        #shareModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #shareContent {
            background: #1a1a2e;
            border: 2px solid #ff6b6b;
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        #shareContent h2 {
            color: #ffd93d;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        #shareStats {
            background: #0f0f0f;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.8;
            text-align: left;
            white-space: pre-wrap;
            color: #f1f1f1;
        }

        #shareButtons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #shareButtons button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #shareButtons button:active {
            transform: scale(0.95);
        }

        #shareButtons button:first-child {
            background: #ff6b6b;
            color: #fff;
        }

        #shareButtons button.close {
            background: #333;
            color: #fff;
        }

        #copyConfirm {
            color: #4ade80;
            margin-top: 15px;
            font-weight: 600;
        }

        #shopBtn {
            background: linear-gradient(135deg, #4a1a6b, #2a1a4b) !important;
            border: 1px solid #8b5cf6 !important;
            color: #fff;
        }

        #shopBtn:hover:not(:disabled) {
            background: linear-gradient(135deg, #5a2a7b, #3a2a5b) !important;
        }

        #shopModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #shopContent {
            background: linear-gradient(135deg, #1a1a2e, #2a1a4b);
            border: 2px solid #8b5cf6;
            border-radius: 16px;
            padding: 25px;
            max-width: 450px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        #shopContent h2 {
            color: #8b5cf6;
            margin-bottom: 15px;
            text-align: center;
        }

        #shopBalance {
            text-align: center;
            font-size: 1.2rem;
            color: #ffd93d;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        #shopItems {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid #333;
        }

        .shop-item-info {
            flex: 1;
        }

        .shop-item-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .shop-item-desc {
            font-size: 12px;
            color: #888;
        }

        .shop-item-level {
            font-size: 11px;
            color: #8b5cf6;
            margin-top: 4px;
        }

        .shop-item button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #8b5cf6;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .shop-item button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .shop-item button:not(:disabled):hover {
            background: #9d6ff7;
        }

        .shop-item.maxed {
            opacity: 0.6;
        }

        .shop-item.maxed .shop-item-level {
            color: #4ade80;
        }

        #shopActions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        #shopActions button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #floodBtn {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
        }

        #floodBtn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        #shopActions button.close {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div id="ui">
        <h1>☄️ Meteor <span>Simulator</span></h1>
        <div class="stats">
            <div class="stat">🦕 Dinosaurs: <span id="dinoCount">0</span></div>
            <div class="stat">💥 Meteors: <span id="meteorCount">0</span></div>
            <div class="stat">🏆 Best Strike: <span id="bestStrike">0</span></div>
        </div>
        <div id="tierDisplay">⚡ Rock Tosser</div>
        <div id="tierProgress"></div>
    </div>

    <div id="killcount">
        <span id="kills">0</span>
        <small>extinctions</small>
    </div>

    <div id="megaMeterContainer">
        <div id="megaMeterLabel">MEGA METEOR</div>
        <div id="megaMeter">
            <div id="megaMeterFill"></div>
        </div>
    </div>

    <div id="zoomControls">
        <!-- Tier buttons inserted by renderTierButtons() -->
        <button id="shopBtn" onclick="showShopModal()">🛒 <span id="fossilBalance">0</span>🦴</button>
        <button onclick="showShareModal()" id="shareBtn">📊</button>
        <button onclick="restartGame()" id="restartBtn" title="Restart Game">🔄</button>
    </div>

    <div id="shareModal" style="display:none;">
        <div id="shareContent">
            <h2>☄️ EXTINCTION REPORT ☄️</h2>
            <div id="shareStats"></div>
            <div id="shareButtons">
                <button onclick="copyStats()">📋 Copy</button>
                <button onclick="closeShareModal()" class="close">Close</button>
            </div>
            <div id="copyConfirm" style="display:none;">✓ Copied!</div>
        </div>
    </div>

    <div id="shopModal" style="display:none;">
        <div id="shopContent">
            <h2>🛒 EXTINCTION SHOP</h2>
            <div id="shopBalance">🦴 <span id="shopFossils">0</span> fossils</div>
            <div id="shopItems"></div>
            <div id="shopActions">
                <button onclick="floodDinos()" id="floodBtn">🌊 Dino Flood (10🦴)</button>
                <button onclick="closeShopModal()" class="close">Close</button>
            </div>
        </div>
    </div>

    <button id="megaButton" onclick="fireMegaMeteor()">☄️ MEGA</button>

    <div id="instructions">
        Click to drop meteors • <span id="megaInstructions">Build up kills for MEGA METEOR</span>
    </div>

    <script>
        // Error handler for debugging
        window.onerror = function(msg, url, line) {
            document.body.innerHTML = '<div style="color:white;padding:20px;font-family:monospace;">Error: ' + msg + '<br>Line: ' + line + '</div>';
            return false;
        };

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let width, height;
        let worldWidth, worldHeight;
        let dinosaurs = [];
        let meteors = [];
        let explosions = [];
        let particles = [];
        let craters = [];
        let kills = 0;
        let totalMeteors = 0;
        let megaMeter = 0;
        const MEGA_METER_MAX = 80; // Increased — meter charges slower now
        let megaReady = false;
        let zoom = 4; // Start very zoomed in; overridden after TIERS init
        let shakeX = 0, shakeY = 0;
        let gameTime = 0;
        let lastMeteorTime = 0;

        const BG_THEMES = [
            { sky1: '#5ba3d0', sky2: '#87CEEB', ground1: '#4a7c3f', ground2: '#2d5a2d' },
            { sky1: '#c4a46b', sky2: '#e8c48a', ground1: '#8B4513', ground2: '#5C3010' },
            { sky1: '#f5a623', sky2: '#ff7f50', ground1: '#cd853f', ground2: '#8B6914' },
            { sky1: '#0a0a15', sky2: '#2d1f3d', ground1: '#2d4a3e', ground2: '#0f1f15' }
        ];
        const bgTheme = BG_THEMES[Math.floor(Math.random() * BG_THEMES.length)];
        let bestStrike = parseInt(localStorage.getItem('meteor-best-strike') || '0');

        // Fossils = spendable currency earned from kills
        // Migrate from old 'meteor-spendable' key if present
        let fossils = parseInt(
            localStorage.getItem('meteor-fossils') ||
            localStorage.getItem('meteor-spendable') ||
            '0'
        );
        let upgrades = JSON.parse(localStorage.getItem('meteor-upgrades') || '{}');
        let killsSinceFlood = 10; // Start able to buy

        // ── Progression Tiers ─────────────────────────────────────────────────────
        // Each tier unlocks a more zoomed-out view + faster meteor cooldown.
        const TIERS = [
            { name: 'Rock Tosser',        label: 'Tiny',  zoom: 4,     cooldown: 1500, unlockAt: 0    },
            { name: 'Pebble Hurler',      label: 'Close', zoom: 2,     cooldown: 900,  unlockAt: 15   },
            { name: 'Meteor Caller',      label: '1x',    zoom: 1,     cooldown: 450,  unlockAt: 60   },
            { name: 'Extinction Agent',   label: '2x',    zoom: 0.5,   cooldown: 180,  unlockAt: 250  },
            { name: 'Cosmic Destroyer',   label: '4x',    zoom: 0.25,  cooldown: 60,   unlockAt: 1000 },
            { name: 'Galaxy Annihilator', label: '8x',    zoom: 0.125, cooldown: 15,   unlockAt: 4000 },
        ];
        let unlockedTierCount = parseInt(localStorage.getItem('meteor-tiers') || '1');
        let currentTierIndex = unlockedTierCount - 1; // Start at highest unlocked tier

        // ── Upgrades ──────────────────────────────────────────────────────────────
        const UPGRADES = {
            meteorSize:  { name: '🔥 Bigger Meteors',  desc: '+20% meteor size',           cost: 25, max: 5, effect: 0.2  },
            maxDinos:    { name: '🦕 More Targets',     desc: '+20 max dinosaurs',          cost: 30, max: 5, effect: 20   },
            meterSpeed:  { name: '⚡ Quick Charge',     desc: 'Mega charges 20% faster',    cost: 40, max: 3, effect: 0.2  },
            blastRadius: { name: '💥 Blast Radius',     desc: '+15% explosion size',        cost: 50, max: 5, effect: 0.15 }
        };

        function getUpgradeLevel(id) { return upgrades[id] || 0; }
        function getMeteorSizeMultiplier()  { return 1 + (getUpgradeLevel('meteorSize')  * UPGRADES.meteorSize.effect);  }
        function getMaxDinosBonus()         { return getUpgradeLevel('maxDinos')          * UPGRADES.maxDinos.effect;    }
        function getMeterSpeedMultiplier()  { return 1 + (getUpgradeLevel('meterSpeed')  * UPGRADES.meterSpeed.effect);  }
        function getBlastRadiusMultiplier() { return 1 + (getUpgradeLevel('blastRadius') * UPGRADES.blastRadius.effect); }
        function getCurrentCooldown()       { return TIERS[currentTierIndex].cooldown; }

        // ── Tier UI ───────────────────────────────────────────────────────────────
        function renderTierButtons() {
            document.querySelectorAll('.tier-btn').forEach(b => b.remove());
            const controls = document.getElementById('zoomControls');
            const shareBtn = document.getElementById('shareBtn');

            for (let i = 0; i < unlockedTierCount; i++) {
                const tier = TIERS[i];
                const btn = document.createElement('button');
                btn.className = 'tier-btn';
                btn.textContent = tier.label;
                btn.title = tier.name;
                if (i === currentTierIndex) btn.classList.add('active');
                btn.onclick = () => setZoom(tier.zoom, i);
                controls.insertBefore(btn, shareBtn);
            }
        }

        function updateTierDisplay() {
            const tier = TIERS[currentTierIndex];
            document.getElementById('tierDisplay').textContent = `⚡ ${tier.name}`;
            if (unlockedTierCount < TIERS.length) {
                const next = TIERS[unlockedTierCount];
                document.getElementById('tierProgress').textContent =
                    `Next: ${next.name} @ ${next.unlockAt} kills (${Math.min(kills, next.unlockAt)}/${next.unlockAt})`;
            } else {
                document.getElementById('tierProgress').textContent = '🌟 MAX TIER REACHED';
            }
        }

        function checkTierUnlock() {
            while (unlockedTierCount < TIERS.length && kills >= TIERS[unlockedTierCount].unlockAt) {
                unlockedTierCount++;
                localStorage.setItem('meteor-tiers', unlockedTierCount);
                const newTier = TIERS[unlockedTierCount - 1];
                setZoom(newTier.zoom, unlockedTierCount - 1); // auto-switch to new tier
                showTierUnlockToast(newTier);
            }
        }

        function showTierUnlockToast(tier) {
            const toast = document.createElement('div');
            toast.className = 'tier-unlock-toast';
            toast.innerHTML = `
                <h3>🎉 Tier Unlocked!</h3>
                <div class="tier-name">${tier.name}</div>
                <div class="tier-desc">View: ${tier.label} &nbsp;•&nbsp; Cooldown: ${tier.cooldown}ms</div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2600);
        }

        // ── World / Zoom ──────────────────────────────────────────────────────────
        let cameraX = 0;
        let cameraY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            updateWorldSize();
        }

        function updateWorldSize() {
            worldWidth  = width  / zoom;
            worldHeight = height / zoom;
        }

        function setZoom(z, tierIdx) {
            zoom = z;
            currentTierIndex = tierIdx;
            updateWorldSize();
            renderTierButtons();
            // Ensure enough dinos for the new view
            const targetDinos = Math.floor(15 / zoom);
            while (dinosaurs.length < targetDinos) spawnDinosaur(true);
            updateTierDisplay();
        }

        // ── Background ────────────────────────────────────────────────────────────
        function drawBackground() {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, worldHeight * 0.65);
            skyGrad.addColorStop(0, bgTheme.sky1);
            skyGrad.addColorStop(1, bgTheme.sky2);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, worldWidth, worldHeight * 0.65);

            const groundGrad = ctx.createLinearGradient(0, worldHeight * 0.65, 0, worldHeight);
            groundGrad.addColorStop(0, bgTheme.ground1);
            groundGrad.addColorStop(1, bgTheme.ground2);
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, worldHeight * 0.65, worldWidth, worldHeight * 0.35);

            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(0, worldHeight * 0.64, worldWidth, worldHeight * 0.02);
        }

        // ── Dino / Explosion types ────────────────────────────────────────────────
        const DINO_TYPES = [
            { emoji: '🦕', weight: 0.25, name: 'Brontosaurus' },
            { emoji: '🦖', weight: 0.25, name: 'T-Rex' },
            { emoji: '🐊', weight: 0.1,  name: 'Proto-croc' },
            { emoji: '🦎', weight: 0.1,  name: 'Tiny lizard' },
            { emoji: '🐢', weight: 0.08, name: 'Ancient turtle' },
            { emoji: '🐍', weight: 0.07, name: 'Snek' },
            { emoji: '🦅', weight: 0.05, name: 'Proto-bird' },
            { emoji: '🦴', weight: 0.05, name: 'Already dead' },
            { emoji: '🥚', weight: 0.03, name: 'Egg', stationary: true },
            { emoji: '🐉', weight: 0.02, name: 'RARE DRAGON' }
        ];

        const EXPLOSION_TYPES = [
            { name: 'standard', colors: ['255,255,200', '255,150,50',  '255,50,0',   '100,0,0'   ] },
            { name: 'plasma',   colors: ['200,255,255', '50,150,255',  '100,0,255',  '50,0,100'  ] },
            { name: 'toxic',    colors: ['200,255,150', '100,255,50',  '0,200,0',    '0,80,0'    ] },
            { name: 'void',     colors: ['255,200,255', '200,50,255',  '100,0,150',  '30,0,50'   ] },
            { name: 'solar',    colors: ['255,255,255', '255,255,100', '255,200,0',  '200,100,0' ] }
        ];

        function pickDino() {
            const r = Math.random();
            let cumulative = 0;
            for (const type of DINO_TYPES) {
                cumulative += type.weight;
                if (r < cumulative) return type;
            }
            return DINO_TYPES[0];
        }

        function pickExplosion() {
            return EXPLOSION_TYPES[Math.floor(Math.random() * EXPLOSION_TYPES.length)];
        }

        // ── Spawn dinosaur ────────────────────────────────────────────────────────
        function spawnDinosaur(anywhere = false) {
            let x, y, vx, vy;
            const speed = 0.3 + Math.random() * 0.5;
            const type = pickDino();

            if (type.stationary || anywhere) {
                x  = Math.random() * worldWidth  * 0.8 + worldWidth  * 0.1;
                y  = Math.random() * worldHeight * 0.5 + worldHeight * 0.3;
                vx = (Math.random() - 0.5) * speed;
                vy = (Math.random() - 0.5) * speed;
            } else {
                const edge = Math.floor(Math.random() * 4);
                switch(edge) {
                    case 0: x = Math.random() * worldWidth;  y = -30;             vx = (Math.random()-0.5)*speed; vy =  Math.random()*speed; break;
                    case 1: x = worldWidth + 30;             y = Math.random() * worldHeight; vx = -Math.random()*speed; vy = (Math.random()-0.5)*speed; break;
                    case 2: x = Math.random() * worldWidth;  y = worldHeight + 30; vx = (Math.random()-0.5)*speed; vy = -Math.random()*speed; break;
                    case 3: x = -30;                         y = Math.random() * worldHeight; vx =  Math.random()*speed; vy = (Math.random()-0.5)*speed; break;
                }
            }

            dinosaurs.push({
                x, y,
                vx: type.stationary ? 0 : vx,
                vy: type.stationary ? 0 : vy,
                emoji: type.emoji,
                name:  type.name,
                size:  24 + Math.random() * 16,
                panic: false,
                panicTime: 0,
                stationary: type.stationary || false,
                facingLeft: type.stationary ? false : vx < 0
            });
        }

        // ── Spawn meteor ──────────────────────────────────────────────────────────
        function spawnMeteor(targetX, targetY, isMega = false) {
            const startX = targetX + (Math.random() - 0.5) * 200;
            const startY = -100;
            const baseSize = isMega ? 80 + Math.random() * 40 : 20 + Math.random() * 30;
            const size = baseSize * getMeteorSizeMultiplier();

            meteors.push({
                x: startX, y: startY,
                targetX, targetY,
                speed: (isMega ? 8 : 15 + Math.random() * 10) / zoom,
                size,
                trail: [],
                isMega,
                explosionType: isMega ? EXPLOSION_TYPES[4] : pickExplosion()
            });

            totalMeteors++;
            document.getElementById('meteorCount').textContent = totalMeteors;

            if (isMega) {
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        const offsetX = targetX + (Math.random() - 0.5) * 400;
                        const offsetY = targetY + (Math.random() - 0.5) * 400;
                        spawnMeteor(offsetX, offsetY, false);
                    }, i * 100);
                }
            }
        }

        // ── Create explosion ──────────────────────────────────────────────────────
        function createExplosion(x, y, size, explosionType, isMega = false) {
            const actualSize = isMega ? size * 2 : size;

            explosions.push({ x, y, radius: 0, maxRadius: actualSize * 4, speed: actualSize * 0.3, alpha: 1, colors: explosionType.colors, isMega });
            craters.push({ x, y, radius: actualSize * 2, alpha: 0.6 });

            const shakeIntensity = isMega ? 40 : 20;
            shakeX = (Math.random() - 0.5) * shakeIntensity;
            shakeY = (Math.random() - 0.5) * shakeIntensity;
            setTimeout(() => { shakeX = 0; shakeY = 0; }, isMega ? 200 : 100);

            const particleCount = isMega ? 80 : 30;
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * (isMega ? 15 : 8);
                const rgb = explosionType.colors[Math.floor(Math.random() * 2)];
                particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, size: 2 + Math.random()*(isMega?8:4), life: 1, color: `rgb(${rgb})` });
            }

            if (isMega) {
                for (let i = 0; i < 360; i += 10) {
                    const angle = (i * Math.PI) / 180;
                    particles.push({ x: x+Math.cos(angle)*50, y: y+Math.sin(angle)*50, vx: Math.cos(angle)*8, vy: Math.sin(angle)*8, size: 6, life: 1.5, color: '#ffd93d' });
                }
            }

            const panicRadius = isMega ? 600 : 300;
            dinosaurs.forEach(dino => {
                if (dino.stationary) return;
                const dx = dino.x - x, dy = dino.y - y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < panicRadius) {
                    dino.panic = true;
                    dino.panicTime = isMega ? 300 : 180;
                    const angle = Math.atan2(dy, dx);
                    dino.vx = Math.cos(angle) * (isMega ? 5 : 3);
                    dino.vy = Math.sin(angle) * (isMega ? 5 : 3);
                }
            });

            const killRadius = (isMega ? actualSize * 5 : actualSize * 3) * getBlastRadiusMultiplier();
            let killsThisExplosion = 0;
            dinosaurs = dinosaurs.filter(dino => {
                const dx = dino.x - x, dy = dino.y - y;
                if (Math.sqrt(dx*dx + dy*dy) < killRadius) {
                    killsThisExplosion++;
                    for (let i = 0; i < 10; i++) {
                        particles.push({ x: dino.x, y: dino.y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5-3, size: 8, life: 1, text: '💀' });
                    }
                    if (dino.name === 'RARE DRAGON') showCombo(dino.x, dino.y - 30, 0, '🐉 DRAGON SLAIN!');
                    return false;
                }
                return true;
            });

            if (killsThisExplosion > 0) {
                kills   += killsThisExplosion;
                fossils += killsThisExplosion;
                killsSinceFlood = Math.min(killsSinceFlood + killsThisExplosion, 10);
                document.getElementById('kills').textContent = kills;
                updateFossils();
                checkTierUnlock();

                if (killsThisExplosion > bestStrike) {
                    bestStrike = killsThisExplosion;
                    localStorage.setItem('meteor-best-strike', bestStrike);
                    document.getElementById('bestStrike').textContent = bestStrike;
                    showCombo(x, y - 80, killsThisExplosion, '🏆 NEW RECORD!');
                }

                // Slower mega charge: 0.25x base rate
                if (!isMega) {
                    const chargeAmount = killsThisExplosion * 0.25 * getMeterSpeedMultiplier();
                    megaMeter = Math.min(megaMeter + chargeAmount, MEGA_METER_MAX);
                    updateMegaMeter();
                }

                if      (killsThisExplosion >= 5) showCombo(x, y - 50, killsThisExplosion, 'EXTINCTION EVENT!');
                else if (killsThisExplosion >= 3) showCombo(x, y - 50, killsThisExplosion, 'TRIPLE KILL!');
                else if (killsThisExplosion >= 2) showCombo(x, y - 50, killsThisExplosion, 'DOUBLE KILL!');
            }
        }

        // ── Mega meter ────────────────────────────────────────────────────────────
        function updateMegaMeter() {
            const fill        = document.getElementById('megaMeterFill');
            const label       = document.getElementById('megaMeterLabel');
            const instructions= document.getElementById('megaInstructions');
            const megaBtn     = document.getElementById('megaButton');

            fill.style.width = ((megaMeter / MEGA_METER_MAX) * 100) + '%';

            if (megaMeter >= MEGA_METER_MAX && !megaReady) {
                megaReady = true;
                fill.classList.add('ready');
                label.classList.add('ready');
                label.textContent = '🔥 MEGA READY 🔥';
                instructions.textContent = 'Tap MEGA or press SPACEBAR!';
                megaBtn.style.display = 'block'; // reveal button only when ready
            }
        }

        function fireMegaMeteor() {
            if (!megaReady) return;
            megaReady = false;
            megaMeter = 0;

            const fill    = document.getElementById('megaMeterFill');
            const label   = document.getElementById('megaMeterLabel');
            const megaBtn = document.getElementById('megaButton');

            fill.style.width = '0%';
            fill.classList.remove('ready');
            label.classList.remove('ready');
            label.textContent = 'MEGA METEOR';
            document.getElementById('megaInstructions').textContent = 'Build up kills for MEGA METEOR';
            megaBtn.style.display = 'none'; // hide again after firing

            const warning = document.createElement('div');
            warning.className = 'megaWarning';
            warning.textContent = '☄️ MEGA METEOR ☄️';
            document.body.appendChild(warning);
            setTimeout(() => warning.remove(), 1500);

            setTimeout(() => spawnMeteor(worldWidth / 2, worldHeight / 2, true), 500);
        }

        // ── Combo text ────────────────────────────────────────────────────────────
        function showCombo(x, y, count, text) {
            const el = document.createElement('div');
            el.className = 'combo';
            el.style.left = (x * zoom) + 'px';
            el.style.top  = (y * zoom) + 'px';
            el.textContent = text || (count + 'x COMBO!');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        // ── Game update ───────────────────────────────────────────────────────────
        function update() {
            gameTime++;
            const baseDinos = Math.min(15 + Math.floor(gameTime / 90), 120);
            const maxDinos  = Math.floor((baseDinos + getMaxDinosBonus()) / zoom);
            if (Math.random() < 0.02 && dinosaurs.length < maxDinos) spawnDinosaur();

            dinosaurs.forEach(dino => {
                if (dino.stationary) return;
                dino.x += dino.vx;
                dino.y += dino.vy;
                if (dino.panic) {
                    dino.panicTime--;
                    if (dino.panicTime <= 0) { dino.panic = false; dino.vx *= 0.3; dino.vy *= 0.3; }
                } else {
                    dino.vx += (Math.random() - 0.5) * 0.05;
                    dino.vy += (Math.random() - 0.5) * 0.05;
                    dino.vx *= 0.99; dino.vy *= 0.99;
                }
                if (dino.x < -50)           dino.vx =  Math.abs(dino.vx);
                if (dino.x > worldWidth +50) dino.vx = -Math.abs(dino.vx);
                if (dino.y < -50)            dino.vy =  Math.abs(dino.vy);
                if (dino.y > worldHeight+50) dino.vy = -Math.abs(dino.vy);
                if (Math.abs(dino.vx) > 0.15) dino.facingLeft = dino.vx < 0;
            });

            document.getElementById('dinoCount').textContent = dinosaurs.length;

            meteors = meteors.filter(m => {
                const dx = m.targetX - m.x, dy = m.targetY - m.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                m.trail.push({x: m.x, y: m.y});
                if (m.trail.length > (m.isMega ? 40 : 20)) m.trail.shift();
                if (dist < m.speed) { createExplosion(m.targetX, m.targetY, m.size, m.explosionType, m.isMega); return false; }
                m.x += (dx / dist) * m.speed;
                m.y += (dy / dist) * m.speed;
                return true;
            });

            explosions = explosions.filter(e => { e.radius += e.speed; e.alpha -= 0.03; return e.alpha > 0; });
            particles  = particles.filter(p  => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02; return p.life > 0; });
            craters.forEach(c => c.alpha *= 0.999);
            craters = craters.filter(c => c.alpha > 0.05);

        }

        // ── Draw ──────────────────────────────────────────────────────────────────
        function draw() {
            ctx.save();
            ctx.translate(shakeX, shakeY);
            ctx.scale(zoom, zoom);

            drawBackground();

            craters.forEach(c => {
                ctx.beginPath(); ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(20,20,20,${c.alpha})`; ctx.fill();
                ctx.beginPath(); ctx.arc(c.x, c.y, c.radius*0.7, 0, Math.PI*2);
                ctx.fillStyle = `rgba(40,40,40,${c.alpha})`; ctx.fill();
            });

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            dinosaurs.forEach(dino => {
                const size = dino.size / zoom;
                ctx.font = `${Math.max(size, 16)}px serif`;

                if (dino.stationary) {
                    ctx.save();
                    ctx.fillStyle = 'rgba(139,90,43,0.6)';
                    ctx.translate(dino.x, dino.y + size/3);
                    ctx.scale(1, 0.4);
                    ctx.beginPath(); ctx.arc(0, 0, size*0.8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'rgba(160,120,60,0.4)';
                    ctx.beginPath(); ctx.arc(0, 0, size*0.5, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }

                ctx.save();
                ctx.translate(dino.x, dino.y);
                if (dino.facingLeft && !dino.stationary) ctx.scale(-1, 1);
                ctx.fillText(dino.emoji, 0, 0);
                ctx.restore();

                if (dino.panic) {
                    ctx.font = `${Math.max(12/zoom, 10)}px serif`;
                    ctx.fillText('😱', dino.x, dino.y - size/2 - 10);
                }
            });

            meteors.forEach(m => {
                m.trail.forEach((t, i) => {
                    const alpha = i / m.trail.length;
                    ctx.beginPath(); ctx.arc(t.x, t.y, m.size*0.3*alpha, 0, Math.PI*2);
                    ctx.fillStyle = m.isMega ? `rgba(255,255,100,${alpha*0.7})` : `rgba(255,150,50,${alpha*0.5})`;
                    ctx.fill();
                });
            });

            meteors.forEach(m => {
                const glowSize = m.isMega ? m.size*3 : m.size*2;
                const glow = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, glowSize);
                if (m.isMega) {
                    glow.addColorStop(0,   'rgba(255,255,200,1)');
                    glow.addColorStop(0.3, 'rgba(255,200,50,0.6)');
                    glow.addColorStop(0.6, 'rgba(255,100,0,0.3)');
                    glow.addColorStop(1,   'rgba(255,0,0,0)');
                } else {
                    glow.addColorStop(0,   'rgba(255,200,100,0.8)');
                    glow.addColorStop(0.5, 'rgba(255,100,50,0.4)');
                    glow.addColorStop(1,   'rgba(255,50,0,0)');
                }
                ctx.fillStyle = glow;
                ctx.beginPath(); ctx.arc(m.x, m.y, glowSize, 0, Math.PI*2); ctx.fill();
                ctx.font = `${m.size}px serif`;
                ctx.fillText(m.isMega ? '🌟' : '☄️', m.x, m.y);
            });

            explosions.forEach(e => {
                const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
                grad.addColorStop(0,   `rgba(${e.colors[0]},${e.alpha})`);
                grad.addColorStop(0.3, `rgba(${e.colors[1]},${e.alpha*0.8})`);
                grad.addColorStop(0.6, `rgba(${e.colors[2]},${e.alpha*0.5})`);
                grad.addColorStop(1,   `rgba(${e.colors[3]},0)`);
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                ctx.fillStyle = grad; ctx.fill();
                if (e.isMega) {
                    ctx.beginPath(); ctx.arc(e.x, e.y, e.radius*1.2, 0, Math.PI*2);
                    ctx.strokeStyle = `rgba(255,255,200,${e.alpha*0.5})`; ctx.lineWidth = 4; ctx.stroke();
                }
            });

            particles.forEach(p => {
                if (p.text) {
                    ctx.globalAlpha = p.life;
                    ctx.font = `${p.size*2}px serif`;
                    ctx.fillText(p.text, p.x, p.y);
                    ctx.globalAlpha = 1;
                } else {
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill(); ctx.globalAlpha = 1;
                }
            });

            ctx.restore();
        }

        // ── Game loop ─────────────────────────────────────────────────────────────
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ── Input events ──────────────────────────────────────────────────────────
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastMeteorTime < getCurrentCooldown()) return;
            lastMeteorTime = now;
            spawnMeteor(e.clientX / zoom, e.clientY / zoom);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - lastMeteorTime < getCurrentCooldown()) return;
            lastMeteorTime = now;
            const t = e.touches[0];
            spawnMeteor(t.clientX / zoom, t.clientY / zoom);
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); fireMegaMeteor(); }
        });

        // ── Fossil (currency) functions ───────────────────────────────────────────
        function updateFossils() {
            document.getElementById('fossilBalance').textContent = fossils;
            document.getElementById('shopFossils').textContent  = fossils;
            localStorage.setItem('meteor-fossils', fossils);
            updateTierDisplay();
        }

        function showShopModal() {
            updateFossils();
            renderShopItems();
            document.getElementById('shopModal').style.display = 'flex';
        }

        function closeShopModal() {
            document.getElementById('shopModal').style.display = 'none';
        }

        function renderShopItems() {
            const container = document.getElementById('shopItems');
            container.innerHTML = Object.entries(UPGRADES).map(([id, upgrade]) => {
                const level   = getUpgradeLevel(id);
                const isMaxed = level >= upgrade.max;
                const cost    = upgrade.cost * (level + 1);
                return `
                    <div class="shop-item ${isMaxed ? 'maxed' : ''}">
                        <div class="shop-item-info">
                            <div class="shop-item-name">${upgrade.name}</div>
                            <div class="shop-item-desc">${upgrade.desc}</div>
                            <div class="shop-item-level">${isMaxed ? '✓ MAXED' : `Level ${level}/${upgrade.max}`}</div>
                        </div>
                        <button onclick="buyUpgrade('${id}')" ${isMaxed || fossils < cost ? 'disabled' : ''}>
                            ${isMaxed ? 'MAX' : cost + '🦴'}
                        </button>
                    </div>`;
            }).join('');

            const floodBtn = document.getElementById('floodBtn');
            const canFlood = fossils >= 10 && killsSinceFlood >= 10;
            floodBtn.disabled = !canFlood;
            floodBtn.textContent = killsSinceFlood < 10
                ? `🌊 Dino Flood (${killsSinceFlood}/10 kills)`
                : '🌊 Dino Flood (10🦴)';
        }

        function buyUpgrade(id) {
            const upgrade = UPGRADES[id];
            const level   = getUpgradeLevel(id);
            const cost    = upgrade.cost * (level + 1);
            if (level >= upgrade.max || fossils < cost) return;
            fossils -= cost;
            upgrades[id] = level + 1;
            localStorage.setItem('meteor-fossils',   fossils);
            localStorage.setItem('meteor-upgrades', JSON.stringify(upgrades));
            updateFossils();
            renderShopItems();
        }

        function floodDinos() {
            if (fossils < 10 || killsSinceFlood < 10) return;
            fossils -= 10;
            killsSinceFlood = 0;
            updateFossils();
            renderShopItems();
            closeShopModal();
            for (let i = 0; i < 30; i++) setTimeout(() => spawnDinosaur(true), i * 50);
        }

        // Close shop on background click
        document.getElementById('shopModal').addEventListener('click', (e) => {
            if (e.target.id === 'shopModal') closeShopModal();
        });

        // ── Restart ───────────────────────────────────────────────────────────────
        function restartGame() {
            if (!confirm('Reset all progress and start over?')) return;

            localStorage.removeItem('meteor-best-strike');
            localStorage.removeItem('meteor-fossils');
            localStorage.removeItem('meteor-spendable');
            localStorage.removeItem('meteor-upgrades');
            localStorage.removeItem('meteor-tiers');

            kills = 0; fossils = 0; totalMeteors = 0;
            megaMeter = 0; megaReady = false; bestStrike = 0;
            upgrades = {}; killsSinceFlood = 10;
            unlockedTierCount = 1; currentTierIndex = 0;
            gameTime = 0; lastMeteorTime = 0;
            dinosaurs = []; meteors = []; explosions = []; particles = []; craters = [];

            zoom = TIERS[0].zoom;
            updateWorldSize();

            document.getElementById('kills').textContent        = '0';
            document.getElementById('meteorCount').textContent  = '0';
            document.getElementById('bestStrike').textContent   = '0';
            const fill  = document.getElementById('megaMeterFill');
            const label = document.getElementById('megaMeterLabel');
            fill.style.width = '0%';
            fill.classList.remove('ready');
            label.classList.remove('ready');
            label.textContent = 'MEGA METEOR';
            document.getElementById('megaInstructions').textContent = 'Build up kills for MEGA METEOR';
            document.getElementById('megaButton').style.display = 'none';

            updateFossils();
            renderTierButtons();
            updateTierDisplay();

            for (let i = 0; i < 6; i++) spawnDinosaur(true);
        }

💀 Total Extinctions: ${kills}
💥 Meteors Dropped: ${totalMeteors}
🏆 Best Single Strike: ${bestStrike}
📊 Kill Efficiency: ${efficiency}/meteor
⚡ Tier Reached: ${TIERS[currentTierIndex].name}
━━━━━━━━━━━━━━━━━━━━
🦕 dinosaurssuck.com`;
        }

        function showShareModal() {
            document.getElementById('shareStats').textContent = getShareText();
            document.getElementById('shareModal').style.display = 'flex';
            document.getElementById('copyConfirm').style.display = 'none';
        }

        function closeShareModal() {
            document.getElementById('shareModal').style.display = 'none';
        }

        function copyStats() {
            const text = getShareText();
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('copyConfirm').style.display = 'block';
                setTimeout(() => document.getElementById('copyConfirm').style.display = 'none', 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                document.getElementById('copyConfirm').style.display = 'block';
                setTimeout(() => document.getElementById('copyConfirm').style.display = 'none', 2000);
            });
        }

        document.getElementById('shareModal').addEventListener('click', (e) => {
            if (e.target.id === 'shareModal') closeShareModal();
        });

        // ── Init ──────────────────────────────────────────────────────────────────
        resize();
        zoom = TIERS[currentTierIndex].zoom;
        updateWorldSize();
        document.getElementById('bestStrike').textContent = bestStrike;
        updateFossils();
        renderTierButtons();
        updateTierDisplay();

        // Spawn a modest starting crowd scaled to the zoomed-in view
        const startDinos = Math.max(Math.floor(8 / zoom), 4);
        for (let i = 0; i < startDinos; i++) spawnDinosaur(true);

        gameLoop();
    </script>
</body>
</html>
